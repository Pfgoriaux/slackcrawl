name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Build binaries
        run: |
          bun build --compile --target=bun-linux-x64 --outfile=slackcrawl-linux-x64 src/index.ts
          bun build --compile --target=bun-linux-arm64 --outfile=slackcrawl-linux-arm64 src/index.ts
          bun build --compile --target=bun-darwin-x64 --outfile=slackcrawl-darwin-x64 src/index.ts
          bun build --compile --target=bun-darwin-arm64 --outfile=slackcrawl-darwin-arm64 src/index.ts
          bun build --compile --target=bun-windows-x64 --outfile=slackcrawl-windows-x64.exe src/index.ts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            slackcrawl-linux-x64
            slackcrawl-linux-arm64
            slackcrawl-darwin-x64
            slackcrawl-darwin-arm64
            slackcrawl-windows-x64.exe
